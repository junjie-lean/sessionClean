<!doctype html>
<html lang="zh-CN">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Session Clean</title>
		<link rel="stylesheet" href="popup.css" />
	</head>
	<body>
		<header class="topbar">
			<div class="brand">
				<div class="brand-icon">
					<img src="assets/icon.png" alt="" />
				</div>
				<div class="brand-text">
					<h1 class="title">清除浏览器缓存</h1>
					<p class="subtitle">一键清理，让浏览器运行更流畅</p>
				</div>
			</div>
			<div class="topbar-actions">
				<button id="btn-close" type="button" class="icon-btn" title="关闭" aria-label="关闭">
					<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12" /></svg>
				</button>
			</div>
		</header>

		<section class="summary-card">
			<div class="gauge">
				<svg class="gauge-ring" viewBox="0 0 88 88" aria-hidden="true">
					<circle class="gauge-track" cx="44" cy="44" r="36"></circle>
					<circle class="gauge-progress" cx="44" cy="44" r="36"></circle>
				</svg>
				<div class="gauge-center">
					<strong id="total-size" class="gauge-value">--</strong>
				</div>
			</div>
			<div class="summary-text">
				<p class="summary-title">
					已选择
					<strong id="selected-count">0</strong>
					项
				</p>
				<p class="summary-desc">清理后可释放存储空间，提升浏览器性能</p>
			</div>
		</section>

		<ul class="cache-list" id="cache-list"></ul>

		<button id="btn-confirm" type="button" class="primary-btn">
			<svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true">
				<path d="M3 6h2l1 12h12l1-12h2" />
				<path d="M9 6V4h6v2" />
				<path d="M8 10l1 8M12 10v8M16 10l-1 8" />
			</svg>
			<span class="btn-text">
				立即清理 (
				<span id="btn-size">--</span>
				)
			</span>
			<span class="btn-spinner" aria-hidden="true"></span>
		</button>

		<p id="status" class="status" aria-live="polite"></p>

		<script src="popup.js"></script>
	</body>
</html>
